name: CI — Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Gemini key not needed for build — just needs to be set
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'build-placeholder' }}
